              h("button",{onClick:function(){wizardStep[1](3);},style:{background:"linear-gradient(135deg,#1a5c35,#2d7a4f)",color:"#fff",border:"none",borderRadius:14,padding:"0.8rem 1.5rem",fontSize:"0.85rem",fontWeight:800,cursor:"pointer",fontFamily:"'Bitter',serif",flex:2,boxShadow:"0 4px 16px rgba(29,92,53,0.25)"}},"Next: Refine Numbers \u2192")
            )
          ),

          // ── STEP 3: REFINE NUMBERS ──
          wizardStep[0]===3 && h("div",{className:"fade-up",style:{display:"grid",gap:"1.2rem",maxWidth:680,margin:"0 auto"}},
            h("div",{style:{textAlign:"center",padding:"0.5rem 0"}},
              h("h2",{style:{fontSize:"1.2rem",fontWeight:800,margin:"0 0 0.3rem",color:"#1a3d2b"}},"Step 3: Refine your numbers"),
              h("p",{style:{fontSize:"0.85rem",color:"#6aab97",fontFamily:"'DM Sans',sans-serif",margin:0}},"Smart defaults for "+gridRow.name+" are already applied. Adjust if needed.")
            ),
            h("div",{style:{background:"#e8f8f0",borderRadius:12,padding:"0.7rem 1rem",fontSize:"0.74rem",color:"#2d6a4a",fontFamily:"'DM Sans',sans-serif",display:"flex",gap:16,flexWrap:"wrap",alignItems:"center"}},
              h("span",null,"\uD83C\uDF0D "+gridRow.name),
              h("span",null,"\u26A1 "+gridRow.ef+" kg CO\u2082/kWh"),
              h("span",null,"\uD83D\uDCB0 Carbon: "+sym+BASE_CARBON+"/t"),
              h("span",null,"\uD83D\uDCC8 Cost of Funding: "+wacc[0]+"%"),
              h("span",{style:{color:"#6aab97",fontSize:"0.65rem",marginLeft:"auto",cursor:"pointer"},onClick:function(){wizardStep[1](1);}},"\u270F Edit")
            ),
            h("div",{style:{background:"#fff",borderRadius:20,padding:"1.5rem",border:"1.5px solid #d4e9dc"}},
              h(SliderInput,{label:"Total Investment Cost \uD83D\uDCA1",value:cost[0],min:50000,max:10000000,step:50000,onChange:cost[1],sym:sym,info:"How much are you spending on this project in total?"}),
              h(SliderInput,{label:"Annual Cost Savings",value:savings[0],min:0,max:500000,step:5000,onChange:savings[1],sym:sym,info:"Energy bills, materials or running costs you will save each year.",color:"#1a8c50"}),
              h(SliderInput,{label:"Money Saved from Fines & Penalties",value:riskAvoid[0],min:0,max:200000,step:2500,onChange:riskAvoid[1],sym:sym,info:"Regulatory fines, carbon charges or insurance costs you will avoid per year.",color:"#2a9d6f"}),
              h(SliderInput,{label:"Extra Revenue from Green Credentials",value:revGrowth[0],min:0,max:200000,step:2500,onChange:revGrowth[1],sym:sym,info:"New contracts or price premium you can charge because of this green investment.",color:"#3ab080"}),
              h(SliderInput,{label:"Green Financing Savings",value:finBonus[0],min:0,max:100000,step:2500,onChange:finBonus[1],sym:sym,info:"Interest savings from a green/sustainability-linked loan at a lower rate.",color:"#4abf8a"})
            ),
            h("div",{style:{display:"flex",gap:"0.8rem"}},
              h("button",{onClick:function(){wizardStep[1](2);},style:{background:"transparent",color:"#2d7a4f",border:"2px solid #2d7a4f",borderRadius:14,padding:"0.8rem 1.5rem",fontSize:"0.85rem",fontWeight:700,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",flex:1}},"\u2190 Back"),
              h("button",{onClick:function(){wizardStep[1](4); if(typeof gtag!=="undefined") gtag("event","calculate_roi",{investment_cost:cost[0],annual_benefit:benefit,horizon_years:horizon[0],wacc:wacc[0]});},
                style:{background:"linear-gradient(135deg,#1a5c35,#2d7a4f)",color:"#fff",border:"none",borderRadius:14,
                padding:"0.8rem 1.5rem",fontSize:"1rem",fontWeight:800,cursor:"pointer",fontFamily:"'Bitter',serif",
                flex:2,boxShadow:"0 4px 20px rgba(29,92,53,0.3)"}},"Calculate My ROI \u2728")
            )
          ),

          // ── STEP 4: RESULTS ──
          wizardStep[0]===4 && h("div",{className:"fade-up",style:{display:"grid",gap:"1.2rem"}},

            // TRAFFIC LIGHT SCORECARD
            (function(){
              var score = enhROI>50?"green":enhROI>15?"yellow":"red";
              var scoreLabel = score==="green"?"Great Investment":score==="yellow"?"Moderate Return":"Review Carefully";
              var scoreIcon = score==="green"?"\uD83D\uDFE2":score==="yellow"?"\uD83D\uDFE1":"\uD83D\uDD34";
              var scoreMsg = score==="green"
                ? "Strong financials and positive environmental impact. Build the business case."
                : score==="yellow"
                ? "Financially viable. Consider optimising savings or extending the horizon."
                : "ROI is low \u2014 review costs, savings assumptions, or consider a phased approach.";
              return h("div",{style:{background:score==="green"?"linear-gradient(135deg,#0f3d22,#1a5c35)":score==="yellow"?"linear-gradient(135deg,#4a3800,#8a6800)":"linear-gradient(135deg,#3d1515,#6b2020)",borderRadius:20,padding:"1.5rem 1.8rem",color:"#fff",display:"flex",alignItems:"center",gap:16,flexWrap:"wrap"}},
                h("div",{style:{fontSize:"3rem",lineHeight:1}},scoreIcon),
                h("div",{style:{flex:1}},
                  h("div",{style:{fontSize:"0.7rem",fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",opacity:0.7,fontFamily:"'DM Sans',sans-serif",marginBottom:3}},"Investment Verdict"),
                  h("div",{style:{fontSize:"1.4rem",fontWeight:800,lineHeight:1.1,marginBottom:4}},scoreLabel),
                  h("div",{style:{fontSize:"0.82rem",opacity:0.85,fontFamily:"'DM Sans',sans-serif",lineHeight:1.5}},scoreMsg)
                ),
                h("div",{style:{textAlign:"right",minWidth:100}},
                  h("div",{style:{fontSize:"2.2rem",fontWeight:800,lineHeight:1}},enhROI.toFixed(1)+"%"),
                  h("div",{style:{fontSize:"0.7rem",opacity:0.7,fontFamily:"'DM Sans',sans-serif"}},"Enhanced ROI")
                )
              );
            })(),

            // KPI GRID
            h("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(140px,1fr))",gap:"0.8rem"}},
              h(KPI,{label:"Payback Period",value:payback?payback.toFixed(1)+" yrs":"Beyond horizon",sub:"Years to break even"}),
              h(KPI,{label:"Net Present Value",value:fmt(npv,sym),sub:horizon[0]+"-yr discounted"}),
              h(KPI,{label:"Carbon Saved",value:co2sPerYr.toFixed(1)+" t/yr",sub:"CO\u2082 every year"}),
              h(KPI,{label:"Annual Value",value:fmt(benefit,sym),sub:"Total benefit yr 1"}),
              h(KPI,{label:"Carbon Tax Savings",value:fmt(ctSave,sym),sub:sym+BASE_CARBON+"/t \u00b7 "+gridRow.name}),
              h(KPI,{label:"Basic ROI",value:basicROI.toFixed(1)+"%",sub:"No escalation"})
            ),

            // EQUIVALENCY METRICS
            (function(){
              var trees = Math.round(co2s * 45);
              var cars = Math.round(co2s / 4.6);
              var homes = Math.round(co2s / 7.5);
              var flights = Math.round(co2s / 0.255);
              return h("div",{style:{background:"#fff",borderRadius:20,padding:"1.5rem",border:"1.5px solid #d4e9dc"}},
                h("h2",{style:{margin:"0 0 0.3rem",fontSize:"1rem",fontWeight:800}},"What does "+co2s.toFixed(0)+" tonnes of CO\u2082 actually mean?"),
                h("p",{style:{margin:"0 0 1rem",fontSize:"0.78rem",color:"#8aab97",fontFamily:"'DM Sans',sans-serif"}},"Over "+horizon[0]+" years, your investment is equivalent to:"),
                h("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(140px,1fr))",gap:"0.7rem"}},
                  [
                    {icon:"\uD83C\uDF33",val:trees.toLocaleString(),label:"Trees planted",sub:"(growing for 10 yrs)"},
                    {icon:"\uD83D\uDE97",val:cars.toLocaleString(),label:"Cars off the road",sub:"(for one year)"},
                    {icon:"\uD83C\uDFE0",val:homes.toLocaleString(),label:"Homes powered",sub:"(annual electricity)"},
                    {icon:"\u2708\uFE0F",val:flights.toLocaleString(),label:"Flights avoided",sub:"(London\u2013New York)"}
                  ].map(function(item){
                    return h("div",{key:item.label,style:{background:"#f0faf4",borderRadius:14,padding:"1rem",textAlign:"center"}},
                      h("div",{style:{fontSize:"1.8rem",marginBottom:4}},item.icon),
                      h("div",{style:{fontSize:"1.1rem",fontWeight:800,color:"#1a5c35"}},item.val),
                      h("div",{style:{fontSize:"0.72rem",fontWeight:700,color:"#1a3d2b",fontFamily:"'DM Sans',sans-serif"}},item.label),
                      h("div",{style:{fontSize:"0.62rem",color:"#8aab97",fontFamily:"'DM Sans',sans-serif",marginTop:2}},item.sub)
                    );
                  })
                )
              );
            })(),

            // CHART
            h("div",{style:{background:"#fff",borderRadius:20,padding:"1.5rem",border:"1.5px solid #d4e9dc"}},
              h("h2",{style:{margin:"0 0 0.3rem",fontSize:"1rem",fontWeight:800}},"ROI Timeline"),
              h("p",{style:{margin:"0 0 1rem",fontSize:"0.78rem",color:"#8aab97",fontFamily:"'DM Sans',sans-serif"}},"Cumulative return over "+horizon[0]+" years \u00b7 Cost of Funding "+wacc[0]+"% \u00b7 "+escalation[0]+"% benefit escalation"),
              h(Chart,{data:yearly,sym:sym,inaction:showInaction[0]?inaction:null})
            ),

            // COST OF INACTION
            h("button",{onClick:function(){showInaction[1](function(v){var next=!v; if(typeof gtag!=="undefined") gtag("event","toggle_cost_of_inaction",{visible:next}); return next;});},style:{background:showInaction[0]?"#6b2020":"#fff3f3",color:showInaction[0]?"#fff":"#8b2a2a",border:"2px solid #8b2a2a",borderRadius:14,padding:"0.85rem 1.5rem",fontSize:"0.88rem",fontWeight:700,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",transition:"all 0.2s"}},
              "\u26A0\uFE0F "+(showInaction[0]?"Hide":"Show")+" Cost of Inaction",
              !showInaction[0] && h("span",{style:{marginLeft:"auto",fontSize:"0.75rem",color:"#c0392b",fontWeight:600}},"Est. "+fmt(totalLoss,sym)+" loss over "+horizon[0]+" yrs")
            ),

            showInaction[0] && h("div",{className:"fade-up",style:{background:"linear-gradient(135deg,#3d1515,#6b2020)",borderRadius:20,padding:"1.8rem",color:"#fff"}},
              h("div",{style:{display:"flex",alignItems:"center",gap:10,marginBottom:"1rem"}},
                h("span",{style:{fontSize:"1.4rem"}},"\u26A0\uFE0F"),
                h("h2",{style:{margin:0,fontSize:"1.1rem",fontWeight:800,color:"#ffb3b3"}},"Cost of Inaction")
              ),
              h("p",{style:{margin:"0 0 1.2rem",fontSize:"0.85rem",color:"#ffd5d5",fontFamily:"'DM Sans',sans-serif",lineHeight:1.6}},"If you delay or skip this investment, here is what your organisation stands to lose over "+horizon[0]+" years."),
              h("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(150px,1fr))",gap:"0.8rem",marginBottom:"1.2rem"}},
                [
                  {l:"Total Opportunity Loss",v:fmt(totalLoss,sym),s:"Over "+horizon[0]+" years (discounted)"},
                  {l:"Avg Annual Loss",v:fmt(totalLoss/horizon[0],sym),s:"Per year of delay"},
                  {l:"Carbon Regulatory Risk",v:fmt(co2s*BASE_CARBON*horizon[0]*(1+carbonEsc[0]/100*horizon[0]/2),sym),s:"Escalating carbon taxes"},
                  {l:"Extra Breakeven Delay",v:"+"+(horizon[0]*0.3).toFixed(1)+" yrs",s:"If you act later"}
                ].map(function(item){
                  return h("div",{key:item.l,style:{background:"rgba(255,255,255,0.1)",borderRadius:12,padding:"0.9rem 1rem"}},
                    h("div",{style:{fontSize:"0.65rem",fontWeight:700,color:"#ffb3b3",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:4}},item.l),
                    h("div",{style:{fontSize:"1.15rem",fontWeight:800,color:"#fff"}},item.v),
                    h("div",{style:{fontSize:"0.7rem",color:"#ffcccc",marginTop:3}},item.s)
                  );
                })
              ),
              h("div",{style:{background:"rgba(0,0,0,0.2)",borderRadius:12,padding:"0.9rem 1rem",fontSize:"0.78rem",color:"#ffd5d5",fontFamily:"'DM Sans',sans-serif",lineHeight:1.6}},
                h("strong",{style:{color:"#ffb3b3"}},"Key risks of inaction: "),
                "Rising energy costs, escalating carbon taxes ("+carbonEsc[0]+"%/yr), ESG reputational risk, and competitive disadvantage as peers decarbonise."
              )
            ),

            // YEAR BY YEAR TABLE
            h("div",{style:{background:"#fff",borderRadius:20,padding:"1.5rem",border:"1.5px solid #d4e9dc"}},
              h("h2",{style:{margin:"0 0 1rem",fontSize:"1rem",fontWeight:800}},"Year-by-Year Breakdown"),
              h("div",{style:{overflowX:"auto"}},
                h("table",{style:{width:"100%",borderCollapse:"collapse",fontSize:"0.78rem",fontFamily:"'DM Sans',sans-serif"}},
                  h("thead",null,h("tr",{style:{borderBottom:"2px solid #d4e9dc"}},
                    ["Year","Gross Benefit","Disc. Benefit","Cumulative Return","Status"].map(function(hdr){
                      return h("th",{key:hdr,style:{padding:"0.5rem 0.8rem",textAlign:"left",fontWeight:700,color:"#4a7a5a",fontSize:"0.7rem",textTransform:"uppercase",letterSpacing:"0.05em"}},hdr);
                    })
                  )),
                  h("tbody",null,yearly.slice(1).map(function(d,i){
                    return h("tr",{key:i,style:{borderBottom:"1px solid #edf7f1",background:i%2===0?"#fafffe":"#fff"}},
                      h("td",{style:{padding:"0.45rem 0.8rem",fontWeight:700,color:"#1a3d2b"}},d.year),
                      h("td",{style:{padding:"0.45rem 0.8rem",color:"#2d7a4f"}},fmt(d.b,sym)),
                      h("td",{style:{padding:"0.45rem 0.8rem",color:"#4a7a5a"}},fmt(d.db,sym)),
                      h("td",{style:{padding:"0.45rem 0.8rem",fontWeight:700,color:d.c>=0?"#1a8c50":"#c0392b"}},fmt(d.c,sym)),
                      h("td",{style:{padding:"0.45rem 0.8rem"}},
                        h("span",{style:{padding:"0.15rem 0.6rem",borderRadius:99,fontSize:"0.65rem",fontWeight:700,background:d.c>=0?"#d4f0e0":"#fde8e8",color:d.c>=0?"#1a5c35":"#c0392b"}},
                          d.c>=0?"\u2713 Positive":"\u25BC Recovering"))
                    );
                  }))
                )
              )
            ),

            // SUMMARY
            h("div",{style:{background:"linear-gradient(135deg,#0f3d22,#1a5c35)",borderRadius:20,padding:"1.8rem",color:"#fff"}},
              h("h2",{style:{margin:"0 0 0.8rem",fontSize:"1rem",fontWeight:800,color:"#a8dbb8",letterSpacing:"0.05em",textTransform:"uppercase"}},"Investment Summary"),
              h("p",{style:{margin:0,fontSize:"0.95rem",lineHeight:1.8,fontFamily:"'DM Sans',sans-serif",color:"#e8f8f0"}},
                "Your ",h("strong",{style:{color:"#fff"}},fmt(cost[0],sym))," ",it.label.toLowerCase()," investment generates an enhanced return of ",
                h("strong",{style:{color:"#a8dbb8"}},enhROI.toFixed(1)+"%"),", with a payback of ",
                h("strong",{style:{color:"#fff"}},payback?payback.toFixed(1)+" years":"beyond the selected horizon"),". NPV is ",
                h("strong",{style:{color:"#fff"}},fmt(npv,sym)),". Saves ",
                h("strong",{style:{color:"#a8dbb8"}},co2s.toFixed(1)+" t CO\u2082")," over "+horizon[0]+" years \u2014 equivalent to planting ",
                h("strong",{style:{color:"#a8dbb8"}},Math.round(co2s*45).toLocaleString()+" trees"),
                ".",showInaction[0] && [" Delaying could cost ",h("strong",{style:{color:"#ffaaaa"}},fmt(totalLoss,sym))," over "+horizon[0]+" years."]
              ),
              h("p",{style:{margin:"1rem 0 0",fontSize:"0.68rem",color:"#6aab7f",fontFamily:"'DM Sans',sans-serif",fontStyle:"italic"}},"Disclaimer: All figures are estimates. Consult a financial advisor before making investment decisions.")
            ),

            // ACTION BUTTONS
            h("div",{className:"no-print",style:{display:"flex",gap:"0.8rem",flexWrap:"wrap"}},
              h("button",{onClick:function(){wizardStep[1](3);},style:{background:"transparent",color:"#2d7a4f",border:"2px solid #2d7a4f",borderRadius:14,padding:"0.8rem 1.5rem",fontSize:"0.85rem",fontWeight:700,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",flex:1,minWidth:140}},"\u2190 Adjust Numbers"),
              h("button",{onClick:function(){if(typeof gtag!=="undefined") gtag("event","export_pdf",{investment_cost:cost[0],roi:enhROI.toFixed(1)}); window.print();},style:{background:"linear-gradient(135deg,#1a5c35,#2d7a4f)",color:"#fff",border:"none",borderRadius:14,padding:"0.8rem 1.5rem",fontSize:"0.85rem",fontWeight:700,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",flex:2,minWidth:180,boxShadow:"0 4px 16px rgba(29,92,53,0.25)"}},"\uD83D\uDDB8 Export / Print as PDF")
            )
          )
        ),
        h("div",{style:{textAlign:"center",padding:"1.5rem",borderTop:"1px solid #d4e9dc",fontSize:"0.7rem",color:"#8aab97",fontFamily:"'DM Sans',sans-serif"}},
          "Sustainability ROI Calculator v3.0 \u00b7 Activity-based EF model \u00b7 IEA \u00b7 GHG Protocol \u00b7 IPCC AR6 \u00b7 "+new Date().getFullYear()
        )
      );
    }

    var root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(h(App, null));
    setTimeout(function(){
      var splash = document.getElementById("splash");
      if(splash) splash.classList.add("hidden");
    }, 800);
  })();
  </script>
</body>
</html>
